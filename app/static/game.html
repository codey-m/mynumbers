<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ARITHMIX</title>
  <link rel="stylesheet" href="styles.css?v=49" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Fredoka+One&family=Patrick+Hand&family=Architects+Daughter&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1 class="logo-banner logo-dotmatrix" aria-label="ARITHMIX">
      <svg id="logo-dots-svg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
    </h1>
    <script>
    (function buildDotMatrixLogo() {
      // Wheaton-inspired letterforms (square proportions, square endpoints).
      // Stroke-weight rule:
      //   • Vertical/diagonal strokes (stems, legs, A's sides) → 3 bulbs
      //   • Horizontal bars (mid-bars, T cap, R bowl top/bottom)  → 2 bulbs
      //   • R bowl right curve                                    → 2 bulbs
      // 11 rows tall, ~11 cols wide for square letters.
      const L = {
        A: [
          "...XXXXX...",
          "..XXXXXXX..",
          "..XXX.XXX..",
          ".XXX...XXX.",
          "XXX.....XXX",
          "XXXXXXXXXXX",
          "XXXXXXXXXXX",
          "XXX.....XXX",
          "XXX.....XXX",
          "XXX.....XXX",
          "XXX.....XXX",
        ],
        R: [
          "XXXXXXXXXXX",
          "XXXXXXXXXXX",
          "XXX......XX",
          "XXX......XX",
          "XXX......XX",
          "XXXXXXXXXXX",
          "XXXXXXXXXXX",
          "XXX..XXX...",
          "XXX...XXX..",
          "XXX....XXX.",
          "XXX.....XXX",
        ],
        I: ["XXX","XXX","XXX","XXX","XXX","XXX","XXX","XXX","XXX","XXX","XXX"],
        T: [
          "XXXXXXXXXXX",
          "XXXXXXXXXXX",
          "....XXX....",
          "....XXX....",
          "....XXX....",
          "....XXX....",
          "....XXX....",
          "....XXX....",
          "....XXX....",
          "....XXX....",
          "....XXX....",
        ],
        H: [
          "XXX.....XXX",
          "XXX.....XXX",
          "XXX.....XXX",
          "XXX.....XXX",
          "XXX.....XXX",
          "XXXXXXXXXXX",
          "XXXXXXXXXXX",
          "XXX.....XXX",
          "XXX.....XXX",
          "XXX.....XXX",
          "XXX.....XXX",
        ],
        M: [
          "XXX.....XXX",
          "XXXX...XXXX",
          "XXXXX.XXXXX",
          "XXX.X.X.XXX",
          "XXX..X..XXX",
          "XXX.....XXX",
          "XXX.....XXX",
          "XXX.....XXX",
          "XXX.....XXX",
          "XXX.....XXX",
          "XXX.....XXX",
        ],
        X: [
          "XXX.....XXX",
          ".XXX...XXX.",
          "..XXX.XXX..",
          "...XXXXX...",
          "....XXX....",
          "....XXX....",
          "....XXX....",
          "...XXXXX...",
          "..XXX.XXX..",
          ".XXX...XXX.",
          "XXX.....XXX",
        ],
      };

      const word = "ARITHMIX";
      const ROWS = 11;
      const LETTER_GAP = 3; // grid columns between letters

      // Compute total columns and collect lit cells
      const cells = [];
      let col = 0;
      for (let i = 0; i < word.length; i++) {
        const pat = L[word[i]];
        const w = pat[0].length;
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < w; c++) {
            if (pat[r][c] === "X") cells.push([col + c, r]);
          }
        }
        col += w + (i < word.length - 1 ? LETTER_GAP : 0);
      }
      const COLS = col;

      // Tight grid: 1-unit separation between dot edges (STEP = D + 1)
      const D = 6;
      const STEP = D + 1;
      const R = D / 2;
      const PAD = 6;
      const W = (COLS - 1) * STEP + D + PAD * 2;
      const H = (ROWS - 1) * STEP + D + PAD * 2;

      // Deterministic accent placement (~15%)
      const RED = "#A31F34"; // MIT red
      const ACCENTS = ["#00C853", "#1E63D8", "#FFC107"];
      // Mulberry32 PRNG with fixed seed for stable pattern
      let s = 0x9e3779b1;
      const rand = () => {
        s |= 0; s = s + 0x6D2B79F5 | 0;
        let t = Math.imul(s ^ s >>> 15, 1 | s);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };

      // Track accent placement to avoid clusters > 2 adjacent of same color
      const cellMap = new Map();
      cells.forEach(([x, y], i) => cellMap.set(x + "," + y, i));
      const colorOf = new Array(cells.length).fill(RED);

      function neighborAccents(x, y, color) {
        // count accent neighbors (4-connected) of same color
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
        let count = 0;
        for (const [dx, dy] of dirs) {
          const idx = cellMap.get((x+dx)+","+(y+dy));
          if (idx !== undefined && colorOf[idx] === color) count++;
        }
        return count;
      }

      const targetAccents = Math.round(cells.length * 0.15);
      let placed = 0, attempts = 0;
      while (placed < targetAccents && attempts < cells.length * 6) {
        attempts++;
        const i = Math.floor(rand() * cells.length);
        if (colorOf[i] !== RED) continue;
        const color = ACCENTS[Math.floor(rand() * ACCENTS.length)];
        const [x, y] = cells[i];
        if (neighborAccents(x, y, color) >= 2) continue; // would form cluster of 3+
        colorOf[i] = color;
        placed++;
      }

      // Build SVG
      const svg = document.getElementById("logo-dots-svg");
      svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
      svg.setAttribute("width", W);
      svg.setAttribute("height", H);
      svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

      cells.forEach(([x, y], i) => {
        const cx = PAD + x * STEP + R;
        const cy = PAD + y * STEP + R;
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", cx);
        c.setAttribute("cy", cy);
        c.setAttribute("r", R);
        c.setAttribute("fill", colorOf[i]);
        svg.appendChild(c);
      });
    })();
    </script>

    <!-- Mode Selection (shown at start) -->
    <div class="mode-selector" id="mode-selector">
      <button id="practiceBtn" class="mode-btn">Practice</button>
      <button id="rush3Btn" class="mode-btn">3-Min Rush</button>
      <button id="rush5Btn" class="mode-btn">5-Min Rush</button>
    </div>

    <!-- Rush Stats (hidden by default) -->
    <div class="rush-stats" id="rush-stats" style="display: none;">
      <div class="stat">
        <span class="stat-label">Time</span>
        <span id="timer" class="stat-value timer">3:00</span>
      </div>
      <div class="stat stat-center">
        <span class="stat-label">Target</span>
        <span id="rush-target" class="stat-value">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Level</span>
        <span id="difficulty-level" class="stat-value">1</span>
      </div>
    </div>

    <!-- Practice Stats -->
    <div class="rush-stats" id="practice-stats" style="display: none;">
      <div class="stat stat-center">
        <span class="stat-label">Target</span>
        <span id="target" class="stat-value">—</span>
      </div>
    </div>

    <div id="how-to-play" class="how-to-play" style="display: none;">
      <strong>How to play:</strong> Drag (or tap) numbers from the bank into the empty slots to make the equation equal the <strong>Target</strong>. 
    </div>

    <div class="template-area" id="template-area" aria-live="polite"></div>

    <div class="bank-area" id="bankArea">
      <!-- <h3>Numbers</h3> -->
      <div id="bank" class="bank"></div>
    </div>

    <div class="controls">
      <button id="resetBtn">Reset</button>
      <button id="newBtn">New Puzzle</button>
      <button id="endRushBtn" style="display: none;" class="caution-btn">End Rush</button>
      <button id="menuBtn" class="caution-btn">Menu</button>
    </div>

    <div id="result" class="result" role="status"></div>

    <!-- Home lightboard (visible on menu only) -->
    <div id="home-lightboard-section" class="lightboard-section" style="display:none;">
      <img class="lightboard-tim" src="/static/images/Tim_three-quarter-full-RGB.svg" alt="Tim" />
      <div class="lightboard" id="home-lightboard">
        <div class="home-lb-surface" id="home-lb-surface"></div>
        <canvas class="home-lb-canvas" id="home-lb-canvas"></canvas>
      </div>
    </div>

    <!-- Lightboard (rush mode only) -->
    <div id="lightboard-section" class="lightboard-section" style="display: none;">
      <img class="lightboard-tim" src="/static/images/Tim_three-quarter-full-RGB.svg" alt="Tim" />
      <div class="lightboard" id="lightboard">
        <div class="lightboard-surface" id="lightboard-surface"></div>
        <button id="shareBtn" class="lightboard-share-btn" style="display:none;" aria-label="Share lightboard">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        </button>
      </div>
    </div>

    <!-- Rush Ready Modal -->
    <div id="rush-ready-modal" class="modal-overlay" style="display: none;">
      <div class="modal-box">
        <h2>Ready to Rush?</h2>
        <p class="modal-desc">Arrange the numbers to hit the <strong>Target</strong>. Solve as many puzzles as you can before time runs out!</p>
        <div class="modal-buttons">
          <button id="rushReadyBtn" class="modal-btn primary">Let's Go!</button>
        </div>
      </div>
    </div>

    <!-- Game Over Modal -->
    <div id="modal" class="modal-overlay" style="display: none;">
      <canvas id="fireworks-canvas" class="fireworks-canvas"></canvas>
      <div class="modal-box">
        <button id="modalCloseBtn" class="modal-close" aria-label="Close">&#x2715;</button>
        <img id="tim-img" class="tim-img" src="" alt="Tim" />
        <h2>Rush Complete!</h2>
        <div class="modal-stats">
          <div class="modal-stat">
            <div class="modal-stat-value" id="puzzlesSolved">0</div>
            <div class="modal-stat-label">Puzzles Solved</div>
          </div>
        </div>
        <img id="lightboard-preview" class="lightboard-preview" style="display:none;" alt="Your ARITHMIX lightboard" />
        <div class="modal-buttons">
          <button id="playAgainBtn" class="modal-btn primary">Play Again</button>
          <button id="backToMenuBtn" class="modal-btn">Back to Menu</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Play-again countdown -->
  <div id="countdown-overlay" style="display:none;">
    <span id="countdown-number"></span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="game.js?v=42"></script>
</body>
</html>
